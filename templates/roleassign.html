<!DOCTYPE html>
<html>
<head>
    <title>Assign Permission to Role</title>
</head>
<body>

<h1>Assign Permission to Role</h1>

{% if message %}
    <p>{{ message }}</p>
{% endif %}

<form method="POST">

    <label for="roleName">Select Role:</label>
    <select name="roleName" id="roleName" required>
        {% if roles %}
            {% for role in roles %}
                <option value="{{ role.roleName }}">{{ role.roleName }}</option>
            {% endfor %}
        {% else %}
            <option disabled>No roles available</option>
        {% endif %}
    </select>

    <br><br>

    <label for="permName">Select Permission:</label>
    <select name="permName" id="permName" required>
        {% if perms %}
            {% for perm in perms %}
                <option value="{{ perm.permName }}">{{ perm.permName }}</option>
            {% endfor %}
        {% else %}
            <option disabled>No permissions available</option>
        {% endif %}
    </select>

    <br><br>

    <button type="submit">Assign Permission</button>
</form>

<br>
<a href="{{ url_for('home') }}">Back to Home</a>

<!-- =========================
     🎵 PERSISTENT BACKGROUND MUSIC
========================= -->
<audio id="bg-music" loop>
    <source src="{{ url_for('static', filename='audio/background.mp3') }}" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById("bg-music");

// restore saved time
const savedTime = localStorage.getItem("bg-music-time");
if (savedTime) {
    music.currentTime = parseFloat(savedTime);
}

music.volume = 0.5;

// ALWAYS attempt play immediately
function tryPlay() {
    const playPromise = music.play();

    if (playPromise !== undefined) {
        playPromise
            .then(() => {
                localStorage.setItem("bg-music-playing", "true");
            })
            .catch(() => {
                // autoplay blocked → unlock on click
                document.addEventListener("click", () => {
                    music.play();
                    localStorage.setItem("bg-music-playing", "true");
                }, { once: true });
            });
    }
}

// ALWAYS attempt on page load
window.addEventListener("load", tryPlay);

// save progress continuously
setInterval(() => {
    if (!music.paused) {
        localStorage.setItem("bg-music-time", music.currentTime);
    }
}, 1000);

// save on exit
window.addEventListener("beforeunload", () => {
    localStorage.setItem("bg-music-time", music.currentTime);
});
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
<!-- =========================
     NAVBAR
========================= -->
<div class="navbar">

    <!-- Left: Logo -->
    <div class="nav-left">
        <a href="{{ url_for('home') }}"><img src="{{ url_for('static', filename='site_images/insidethegrid.png') }}" class="nav-logo"></a>
    </div>

    <!-- Center: Nav Links -->
    <div class="nav-links">
        <a href="{{ url_for('home') }}">Home</a> |
        <a href="#">Catalog</a> |
        <a href="#">Contact</a> |
		<a href="{{ url_for('account') }}">Account</a>
    </div>

    <!-- Right: Search + Profile -->
    <div class="nav-right">

        <form method="GET" action="{{ url_for('search') }}">
            <input type="text" name="q" placeholder="Search..." class="search-bar">
        </form>

        <div class="profile-circle">
            {% if session.get('logged_in') %}
                <a href="{{ url_for('account') }}"><img src="{{ url_for('profile_pics', filename=session.get('profile_pic', 'default_pfp.jpg')) }}"></a>
            {% endif %}
        </div>

    </div>
</div>

<!-- Divider -->
<div class="divider"></div>

<div class="center-container">

    <div class="form-box">

        <h1>Login</h1>

        <form method="POST" action="{{ url_for('login') }}">

            <input type="text" name="username" placeholder="Username" required>
            <br><br>

            <input type="password" name="password" placeholder="Password" required>
            <br><br>

            <button type="submit">Login</button>

        </form>

        {% with messages = get_flashed_messages() %}
    {% for msg in messages %}
        <p class="message">{{ msg }}</p>
    {% endfor %}
{% endwith %}

        <br>

        <p>
            Don’t have an account?
            <a href="{{ url_for('signup') }}">Sign up here</a>
        </p>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{{ sub.title }}</title>
</head>
<body>

<h1>{{ sub.title }}</h1>

{% if figures %}
    <ul>
        {% for fig in figures %}
            <li>
                <strong>{{ fig.name }}</strong><br>
                {{ fig.desc }}
            </li>
        {% endfor %}
    </ul>
{% else %}
    <p>No figures in this subcollection.</p>
{% endif %}

<hr>

<a href="{{ url_for('edit_subcollection', id=sub.id) }}">
    <button>Edit Subcollection</button>
</a>

<br><br>
<a href="{{ url_for('account') }}">Back to Account</a>

<div class="fab-container">
    <div class="fab-button" onclick="toggleFabMenu()">
        <img src="{{ url_for('static', filename='site_images/tron.png') }}">
    </div>

    <div class="fab-menu" id="fabMenu">
        <a href="#">Help</a>
        <a href="#">Contact Us</a>

        {% if session.get('logged_in') %}
            <a href="{{ url_for('admin') }}">Admin Page</a>
        {% endif %}
    </div>
</div>

<script>
function toggleFabMenu() {
    const menu = document.getElementById("fabMenu");
    menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
}
</script>


<audio id="bg-music" loop>
    <source src="{{ url_for('static', filename='audio/background.mp3') }}" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById("bg-music");

// restore saved time
const savedTime = localStorage.getItem("bg-music-time");
if (savedTime) {
    music.currentTime = parseFloat(savedTime);
}

music.volume = 0.5;

// ALWAYS attempt play immediately
function tryPlay() {
    const playPromise = music.play();

    if (playPromise !== undefined) {
        playPromise
            .then(() => {
                localStorage.setItem("bg-music-playing", "true");
            })
            .catch(() => {
                // autoplay blocked → unlock on click
                document.addEventListener("click", () => {
                    music.play();
                    localStorage.setItem("bg-music-playing", "true");
                }, { once: true });
            });
    }
}

// ALWAYS attempt on page load
window.addEventListener("load", tryPlay);

// save progress continuously
setInterval(() => {
    if (!music.paused) {
        localStorage.setItem("bg-music-time", music.currentTime);
    }
}, 1000);

// save on exit
window.addEventListener("beforeunload", () => {
    localStorage.setItem("bg-music-time", music.currentTime);
});
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Search Results</title>
</head>

<body>
<h2>Login Attempt Logs</h2>

<table border="1">
<tr>
    <th>Username</th>
    <th>IP</th>
    <th>Success</th>
    <th>Timed Out</th>
    <th>Time</th>
</tr>

{% for log in logs %}
<tr class="{% if log.timed_out %}timeout{% endif %}">
    <td>{{ log.username_attempted }}</td>
    <td>{{ log.ip_address }}</td>
    <td>{{ "Yes" if log.success else "No" }}</td>
    <td>{{ "Yes" if log.timed_out else "No" }}</td>
    <td>{{ log.attempt_time }}</td>
</tr>
{% endfor %}
</table>

<style>
.timeout {
    color: red;
    font-weight: bold;
}
</style>

<!-- =========================
     🎵 PERSISTENT BACKGROUND MUSIC
========================= -->
<audio id="bg-music" loop>
    <source src="{{ url_for('static', filename='audio/background.mp3') }}" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById("bg-music");

// restore saved time
const savedTime = localStorage.getItem("bg-music-time");
if (savedTime) {
    music.currentTime = parseFloat(savedTime);
}

music.volume = 0.5;

// ALWAYS attempt play immediately
function tryPlay() {
    const playPromise = music.play();

    if (playPromise !== undefined) {
        playPromise
            .then(() => {
                localStorage.setItem("bg-music-playing", "true");
            })
            .catch(() => {
                // autoplay blocked → unlock on click
                document.addEventListener("click", () => {
                    music.play();
                    localStorage.setItem("bg-music-playing", "true");
                }, { once: true });
            });
    }
}

// ALWAYS attempt on page load
window.addEventListener("load", tryPlay);

// save progress continuously
setInterval(() => {
    if (!music.paused) {
        localStorage.setItem("bg-music-time", music.currentTime);
    }
}, 1000);

// save on exit
window.addEventListener("beforeunload", () => {
    localStorage.setItem("bg-music-time", music.currentTime);
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body class="loading-body">

    <!-- =========================
         START SCREEN (IMPORTANT)
    ========================== -->
    <div id="start-screen" class="start-screen">
        <h1 class="start-title">CLICK TO INITIATE SYSTEM</h1>
    </div>

    <!-- =========================
         LOADING UI
    ========================== -->
    <div id="loading-ui" style="display:none;">

        <h1 id="loading-text">Initiating System...</h1>

        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

    </div>

    <!-- AUDIO -->
    <audio id="beep" src="{{ url_for('static', filename='audio/loading.mp3') }}" preload="auto"></audio>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const totalBlocks = 20;
    const duration = 10000;
    const intervalTime = duration / totalBlocks;
    const BEEP_GAP = 1000;

    const startScreen = document.getElementById("start-screen");
    const loadingUI = document.getElementById("loading-ui");
    const progressBar = document.getElementById("progress-bar");
    const text = document.getElementById("loading-text");
    const beepAudio = document.getElementById("beep");

    let index = 0;
    let started = false;

    // build blocks immediately
    for (let i = 0; i < totalBlocks; i++) {
        const block = document.createElement('div');
        block.classList.add('block');
        progressBar.appendChild(block);
    }

    const blocks = document.querySelectorAll('.block');

    // =========================
    // START FUNCTION
    // =========================
    function startSystem() {

        if (started) return;
        started = true;

        // swap screens
        startScreen.style.display = "none";
        loadingUI.style.display = "block";

        // -------------------------
        // BEEP LOOP 
        // -------------------------
        const beepTimer = setInterval(() => {
            beepAudio.currentTime = 0;
            beepAudio.play().catch(() => {});
        }, BEEP_GAP);

        // -------------------------
        // PROGRESS LOOP
        // -------------------------
        const progressTimer = setInterval(() => {

            if (index < blocks.length) {
                blocks[index].classList.add('active');
                index++;
                text.classList.toggle('blink');

            } else {
                clearInterval(progressTimer);
                clearInterval(beepTimer);

                document.body.classList.add("fade-out");

                setTimeout(() => {
                    setTimeout(() => {
                        window.location.href = "{{ url_for('nav') }}";
                    }, 2000);
                }, 900);
            }

        }, intervalTime);
    }

    // ONLY START WHEN USER CLICKS START SCREEN
    startScreen.addEventListener("click", startSystem, { once: true });

});
</script>

</body>
</html>

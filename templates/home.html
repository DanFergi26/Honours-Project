<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<!-- =========================
     NAVBAR
========================= -->
<div class="navbar">

    <!-- Left: Logo -->
    <div class="nav-left">
        <a href="{{ url_for('home') }}"><img src="{{ url_for('static', filename='site_images/insidethegrid.png') }}" class="nav-logo"></a>
    </div>

    <!-- Center: Nav Links -->
    <div class="nav-links">
        <a href="{{ url_for('home') }}">Home</a> |
        <a href="#">Catalog</a> |
        <a href="#">Contact</a> |
		<a href="{{ url_for('account') }}">Account</a>
    </div>

    <!-- Right: Search + Profile -->
    <div class="nav-right">

        <form method="GET" action="{{ url_for('search') }}">
            <input type="text" name="q" placeholder="Search..." class="search-bar">
        </form>

        <div class="profile-circle">
            {% if session.get('logged_in') %}
                <a href="{{ url_for('account') }}"><img src="{{ url_for('profile_pics', filename=session.get('profile_pic', 'default_pfp.jpg')) }}"></a>
            {% endif %}
        </div>

    </div>
</div>

<!-- Divider -->
<div class="divider"></div>

<!-- =========================
     IMAGE SLIDER
========================= -->
<div class="slider-container">

    <div class="slider">
        <img src="{{ url_for('static', filename='slider_images/img1.jpg') }}" class="slide active">
        <img src="{{ url_for('static', filename='slider_images/img2.jpg') }}" class="slide">
        <img src="{{ url_for('static', filename='slider_images/img3.jpg') }}" class="slide">
        <img src="{{ url_for('static', filename='slider_images/img4.jpg') }}" class="slide">
    </div>

    <button class="arrow left" onclick="prevSlide()">❮</button>
    <button class="arrow right" onclick="nextSlide()">❯</button>

    <div class="dots">
        <span class="dot active" onclick="setSlide(0)"></span>
        <span class="dot" onclick="setSlide(1)"></span>
        <span class="dot" onclick="setSlide(2)"></span>
        <span class="dot" onclick="setSlide(3)"></span>
    </div>

</div>

<!-- =========================
     CONTENT
========================= -->

<!-- Figure News -->
<div class="section-title">Figure News</div>

<div class="content-container">
    <div class="grid">
        {% for i in range(10) %}
            <div class="grid-box"></div>
        {% endfor %}
    </div>
</div>

<!-- Upcoming Figures -->
<div class="section-title">Upcoming Figures</div>

<div class="content-container">
    <div class="grid">
        {% for i in range(10) %}
            <div class="grid-box"></div>
        {% endfor %}
    </div>
</div>

<div class="divider"></div>

<!-- Floating Action Button -->
<div class="fab-container">

    <!-- Circle Button -->
    <div class="fab-button" onclick="toggleFabMenu()">
        <img src="{{ url_for('static', filename='site_images/tron.png') }}" alt="Menu">
    </div>

    <!-- Popup Menu -->
    <div class="fab-menu" id="fabMenu">

        <a href="#">Help</a>
        <a href="#">Contact Us</a>

        {% if session.get('logged_in') %}
            <a href="{{ url_for('admin') }}">Admin Page</a>
        {% endif %}

    </div>

</div>
<!-- =========================
     SLIDER SCRIPT
========================= -->
<script>
let current = 0;
const slides = document.querySelectorAll(".slide");
const dots = document.querySelectorAll(".dot");

function showSlide(index) {
    slides.forEach(s => s.classList.remove("active"));
    dots.forEach(d => d.classList.remove("active"));

    slides[index].classList.add("active");
    dots[index].classList.add("active");
}

function nextSlide() {
    current = (current + 1) % 4;
    showSlide(current);
}

function prevSlide() {
    current = (current - 1 + 4) % 4;
    showSlide(current);
}

function setSlide(index) {
    current = index;
    showSlide(current);
}
</script>

<script>
function toggleFabMenu() {
    const menu = document.getElementById("fabMenu");
    menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
}
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<!-- =========================
     NAVBAR
========================= -->
<div class="navbar">

    <div class="nav-left">
        <a href="{{ url_for('home') }}">
            <img src="{{ url_for('static', filename='site_images/insidethegrid.png') }}" class="nav-logo">
        </a>
    </div>

    <div class="nav-links">
        <a href="{{ url_for('home') }}">Home</a> |
        <a href="#">Catalog</a> |
        <a href="#">Contact</a> |
        <a href="{{ url_for('account') }}">Account</a>
    </div>

    <div class="nav-right">
        <form method="GET" action="{{ url_for('search') }}">
            <input type="text" name="q" placeholder="Search..." class="search-bar">
        </form>

        <div class="profile-circle">
            {% if session.get('logged_in') %}
                <a href="{{ url_for('account') }}">
                    <img src="{{ url_for('profile_pics', filename=session.get('profile_pic', 'default_pfp.jpg')) }}">
                </a>
            {% endif %}
        </div>
    </div>
</div>

<div class="divider"></div>

<!-- =========================
     SLIDER
========================= -->
<div class="slider-container">
    <div class="slider">
        <img src="{{ url_for('static', filename='slider_images/img1.jpg') }}" class="slide active">
        <img src="{{ url_for('static', filename='slider_images/img2.jpg') }}" class="slide">
        <img src="{{ url_for('static', filename='slider_images/img3.jpg') }}" class="slide">
        <img src="{{ url_for('static', filename='slider_images/img4.jpg') }}" class="slide">
    </div>

    <button class="arrow left" onclick="prevSlide()">❮</button>
    <button class="arrow right" onclick="nextSlide()">❯</button>

    <div class="dots">
        <span class="dot active" onclick="setSlide(0)"></span>
        <span class="dot" onclick="setSlide(1)"></span>
        <span class="dot" onclick="setSlide(2)"></span>
        <span class="dot" onclick="setSlide(3)"></span>
    </div>
</div>

<!-- CONTENT -->
<div class="section-title">Figure News</div>
<div class="content-container">
    <div class="grid">
        {% for i in range(10) %}
            <div class="grid-box"></div>
        {% endfor %}
    </div>
</div>

<div class="section-title">Upcoming Figures</div>
<div class="content-container">
    <div class="grid">
        {% for i in range(5) %}
            <div class="grid-box"></div>
        {% endfor %}
    </div>
</div>

<div class="divider"></div>

<!-- FAB -->
<div class="fab-container">
    <div class="fab-button" onclick="toggleFabMenu()">
        <img src="{{ url_for('static', filename='site_images/tron.png') }}">
    </div>

    <div class="fab-menu" id="fabMenu">
        <a href="#">Help</a>
        <a href="#">Contact Us</a>

        {% if session.get('logged_in') %}
            <a href="{{ url_for('admin') }}">Admin Page</a>
        {% endif %}
    </div>
</div>

<!-- =========================
     SLIDER SCRIPT
========================= -->
<script>
let current = 0;
const slides = document.querySelectorAll(".slide");
const dots = document.querySelectorAll(".dot");

function showSlide(index) {
    slides.forEach(s => s.classList.remove("active"));
    dots.forEach(d => d.classList.remove("active"));

    slides[index].classList.add("active");
    dots[index].classList.add("active");
}

function nextSlide() {
    current = (current + 1) % 4;
    showSlide(current);
}

function prevSlide() {
    current = (current - 1 + 4) % 4;
    showSlide(current);
}

function setSlide(index) {
    current = index;
    showSlide(index);
}

function toggleFabMenu() {
    const menu = document.getElementById("fabMenu");
    menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
}
</script>

<!-- =========================
     🎵 PERSISTENT BACKGROUND MUSIC
========================= -->
<audio id="bg-music" loop>
    <source src="{{ url_for('static', filename='audio/background.mp3') }}" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById("bg-music");

// restore saved time
const savedTime = localStorage.getItem("bg-music-time");
if (savedTime) {
    music.currentTime = parseFloat(savedTime);
}

music.volume = 0.5;

// ALWAYS attempt play immediately
function tryPlay() {
    const playPromise = music.play();

    if (playPromise !== undefined) {
        playPromise
            .then(() => {
                localStorage.setItem("bg-music-playing", "true");
            })
            .catch(() => {
                // autoplay blocked → unlock on click
                document.addEventListener("click", () => {
                    music.play();
                    localStorage.setItem("bg-music-playing", "true");
                }, { once: true });
            });
    }
}

// ALWAYS attempt on page load
window.addEventListener("load", tryPlay);

// save progress continuously
setInterval(() => {
    if (!music.paused) {
        localStorage.setItem("bg-music-time", music.currentTime);
    }
}, 1000);

// save on exit
window.addEventListener("beforeunload", () => {
    localStorage.setItem("bg-music-time", music.currentTime);
});
</script>

</body>
</html>

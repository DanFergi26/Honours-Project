<!DOCTYPE html>
<html>
<head>
    <title>Inside the Grid</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="nav-fade-in">

<div class="center-container">

    <!-- Logo Circle -->
    <div class="logo-circle"></div>

    <!-- Navigation Buttons -->
    <div class="nav-vertical">
        <a href="{{ url_for('home') }}" class="nav-button">HOME</a>
        <a href="" class="nav-button">CATALOG</a>
        <a href="" class="nav-button">CONTACT US</a>
    </div>

    <!-- Social Circle -->
    <div class="social-circle"></div>

</div>

<script>
function toggleFabMenu() {
    const menu = document.getElementById("fabMenu");
    menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
}
</script>

<audio id="bg-music" loop>
    <source src="{{ url_for('static', filename='audio/background.mp3') }}" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById("bg-music");

// restore saved time
const savedTime = localStorage.getItem("bg-music-time");
if (savedTime) {
    music.currentTime = parseFloat(savedTime);
}

music.volume = 0.5;

// ALWAYS attempt play immediately
function tryPlay() {
    const playPromise = music.play();

    if (playPromise !== undefined) {
        playPromise
            .then(() => {
                localStorage.setItem("bg-music-playing", "true");
            })
            .catch(() => {
                // autoplay blocked → unlock on click
                document.addEventListener("click", () => {
                    music.play();
                    localStorage.setItem("bg-music-playing", "true");
                }, { once: true });
            });
    }
}

// ALWAYS attempt on page load
window.addEventListener("load", tryPlay);

// save progress continuously
setInterval(() => {
    if (!music.paused) {
        localStorage.setItem("bg-music-time", music.currentTime);
    }
}, 1000);

// save on exit
window.addEventListener("beforeunload", () => {
    localStorage.setItem("bg-music-time", music.currentTime);
});
</script>
</body>
</html>

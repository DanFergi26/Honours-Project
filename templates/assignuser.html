<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Assign Role</title>
</head>
<body>

    <h1>Assign Role to User</h1>

    {% if message %}
        <p style="color:red;">{{ message }}</p>
    {% endif %}

    <form method="POST">

        <!-- USER SELECTION (FIXED: matches backend "username") -->
        <label for="username">Select User:</label>
        <select name="username" id="username" required>
            {% for user in users %}
                <option value="{{ user.username }}">
                    {{ user.username }} ({{ user.email }})
                </option>
            {% endfor %}
        </select>

        <br><br>

        <!-- ROLE SELECTION -->
        <label for="role_id">Select Role:</label>
        <select name="role_id" id="role_id" required>
            {% for role in roles %}
                <option value="{{ role.id }}">
                    {{ role.roleName }}
                </option>
            {% endfor %}
        </select>

        <br><br>

        <button type="submit">Assign Role</button>

    </form>

    <br>
    <a href="{{ url_for('home') }}">Back to Home</a>
	
	<!-- =========================
     🎵 PERSISTENT BACKGROUND MUSIC
========================= -->
<audio id="bg-music" loop>
    <source src="{{ url_for('static', filename='audio/background.mp3') }}" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById("bg-music");

// restore saved time
const savedTime = localStorage.getItem("bg-music-time");
if (savedTime) {
    music.currentTime = parseFloat(savedTime);
}

music.volume = 0.5;

// ALWAYS attempt play immediately
function tryPlay() {
    const playPromise = music.play();

    if (playPromise !== undefined) {
        playPromise
            .then(() => {
                localStorage.setItem("bg-music-playing", "true");
            })
            .catch(() => {
                // autoplay blocked → unlock on click
                document.addEventListener("click", () => {
                    music.play();
                    localStorage.setItem("bg-music-playing", "true");
                }, { once: true });
            });
    }
}

// ALWAYS attempt on page load
window.addEventListener("load", tryPlay);

// save progress continuously
setInterval(() => {
    if (!music.paused) {
        localStorage.setItem("bg-music-time", music.currentTime);
    }
}, 1000);

// save on exit
window.addEventListener("beforeunload", () => {
    localStorage.setItem("bg-music-time", music.currentTime);
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Assign Role</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<!-- =========================
     NAVBAR
========================= -->
<div class="navbar">

    <div class="nav-left">
        <a href="{{ url_for('home') }}">
            <img src="{{ url_for('static', filename='site_images/insidethegrid.png') }}" class="nav-logo">
        </a>
    </div>

    <div class="nav-links">
        <a href="{{ url_for('home') }}">Home</a> |
        <a href="#">Catalog</a> |
        <a href="#">Contact</a> |
        <a href="{{ url_for('account') }}">Account</a>
    </div>

    <div class="nav-right">
        <form method="GET" action="{{ url_for('search') }}">
            <input type="text" name="q" placeholder="Search..." class="search-bar">
        </form>

        <div class="profile-circle">
            {% if session.get('logged_in') %}
                <a href="{{ url_for('account') }}">
                    <img src="{{ url_for('profile_pics', filename=session.get('profile_pic', 'default_pfp.jpg')) }}">
                </a>
            {% endif %}
        </div>
    </div>
</div>

<div class="divider"></div>

<div class="center-container">

    <div class="form-box">

        <h1>Assign Role</h1>

        {% if message %}
            <p class="message">{{ message }}</p>
        {% endif %}

        <form method="POST">

            <label>User</label>
            <select name="username" required>
                {% for user in users %}
                    <option value="{{ user.username }}">
                        {{ user.username }} ({{ user.email }})
                    </option>
                {% endfor %}
            </select>

            <br><br>

            <label>Role</label>
            <select name="role_id" required>
                {% for role in roles %}
                    <option value="{{ role.id }}">{{ role.roleName }}</option>
                {% endfor %}
            </select>

            <br><br>

            <button type="submit">Assign</button>

        </form>

        <br>
        <a href="{{ url_for('admin') }}">Back</a>

    </div>

</div>

<div class="fab-container">
    <div class="fab-button" onclick="toggleFabMenu()">
        <img src="{{ url_for('static', filename='site_images/tron.png') }}">
    </div>

    <div class="fab-menu" id="fabMenu">
        <a href="#">Help</a>
        <a href="#">Contact Us</a>
        {% if session.get('logged_in') %}
            <a href="{{ url_for('admin') }}">Admin Page</a>
        {% endif %}
    </div>
</div>

<script>
function toggleFabMenu() {
    const menu = document.getElementById("fabMenu");
    menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
}
</script>

<audio id="bg-music" loop>
    <source src="{{ url_for('static', filename='audio/background.mp3') }}" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById("bg-music");

const savedTime = localStorage.getItem("bg-music-time");
if (savedTime) music.currentTime = parseFloat(savedTime);

music.volume = 0.5;

function tryPlay() {
    const playPromise = music.play();
    if (playPromise) {
        playPromise.catch(() => {
            document.addEventListener("click", () => music.play(), { once: true });
        });
    }
}

window.addEventListener("load", tryPlay);

setInterval(() => {
    if (!music.paused) {
        localStorage.setItem("bg-music-time", music.currentTime);
    }
}, 1000);

window.addEventListener("beforeunload", () => {
    localStorage.setItem("bg-music-time", music.currentTime);
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Account Recovery</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<!-- =========================
     NAVBAR
========================= -->
<div class="navbar">

    <div class="nav-left">
        <a href="{{ url_for('home') }}">
            <img src="{{ url_for('static', filename='site_images/insidethegrid.png') }}" class="nav-logo">
        </a>
    </div>

    <div class="nav-links">
        <a href="{{ url_for('home') }}">Home</a> |
        <a href="#">Catalog</a> |
        <a href="#">Contact</a> |
        <a href="{{ url_for('account') }}">Account</a>
    </div>

    <div class="nav-right">
        <form method="GET" action="{{ url_for('search') }}">
            <input type="text" name="q" placeholder="Search..." class="search-bar">
        </form>

        <div class="profile-circle">
            {% if session.get('logged_in') %}
                <a href="{{ url_for('account') }}">
                    <img src="{{ url_for('profile_pics', filename=session.get('profile_pic', 'default_pfp.jpg')) }}">
                </a>
            {% endif %}
        </div>
    </div>
</div>

<div class="divider"></div>

<div class="center-container">

    <div class="form-box">

        <h1>Secure Account Recovery</h1>

        <p>Enter your email to receive a verification code.</p>

        <form method="POST">

            <input type="email" name="email" placeholder="Email address" required>
            <br><br>

            <button type="submit">Send Code</button>

        </form>

        {% for msg in get_flashed_messages() %}
            <p class="message">{{ msg }}</p>
        {% endfor %}

    </div>

</div>

<div class="fab-container">
    <div class="fab-button" onclick="toggleFabMenu()">
        <img src="{{ url_for('static', filename='site_images/tron.png') }}">
    </div>

    <div class="fab-menu" id="fabMenu">
        <a href="#">Help</a>
        <a href="#">Contact Us</a>

        {% if session.get('logged_in') %}
            <a href="{{ url_for('admin') }}">Admin Page</a>
        {% endif %}
    </div>
</div>

</body>
</html>

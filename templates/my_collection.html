<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>My Collection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<!-- =========================
     NAVBAR
========================= -->
<div class="navbar">

    <!-- Left: Logo -->
    <div class="nav-left">
        <a href="{{ url_for('home') }}"><img src="{{ url_for('static', filename='site_images/insidethegrid.png') }}" class="nav-logo"></a>
    </div>

    <!-- Center: Nav Links -->
    <div class="nav-links">
        <a href="{{ url_for('home') }}">Home</a> |
        <a href="#">Catalog</a> |
        <a href="#">Contact</a> |
		<a href="{{ url_for('account') }}">Account</a>
    </div>

    <!-- Right: Search + Profile -->
    <div class="nav-right">

        <form method="GET" action="{{ url_for('search') }}">
            <input type="text" name="q" placeholder="Search..." class="search-bar">
        </form>

        <div class="profile-circle">
            {% if session.get('logged_in') %}
                <a href="{{ url_for('account') }}"><img src="{{ url_for('profile_pics', filename=session.get('profile_pic', 'default_pfp.jpg')) }}"></a>
            {% endif %}
        </div>

    </div>
</div>

<!-- Divider -->
<div class="divider"></div>
<div class="page-container">
<h1>My Collection</h1>

{% if figures %}
    <div class="figure-grid">

        {% for fig in figures %}

        <a href="{{ url_for('figure_view', figure_id=fig.id) }}" class="figure-card-link">

            <div class="figure-card">

                {% if fig.images and fig.images|length > 0 %}
                    <img src="{{ url_for('static', filename='figure_images/' ~ fig.images[0].image_path) }}"
                         class="figure-img">
                {% endif %}

                <p class="figure-name">{{ fig.name }}</p>

            </div>

        </a>

        {% endfor %}

    </div>
{% else %}
    <p>Your collection is empty.</p>
{% endif %}

<br>
<a href="{{ url_for('account') }}">Back to Account</a>
</div>
</body>
</html>
